<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalog Barang - Galaksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            background: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Background stars effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
            pointer-events: none;
        }

        /* Create twinkling stars */
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0.5);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.5);
            border-radius: 12px;
            color: white;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            background: rgba(30, 41, 59, 0.9);
        }

        .button-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5);
        }

        .button-primary:active {
            transform: translateY(0);
        }

        .table-header {
            background: rgba(51, 65, 85, 0.8);
            border-bottom: 2px solid #6366f1;
        }

        .table-row {
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.3s ease;
        }

        .table-row:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: scale(1.01);
        }

        .product-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 16px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.2), transparent);
            transition: 0.5s;
        }

        .product-card:hover::before {
            left: 100%;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.3);
        }

        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #8b5cf6;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4">
        <header class="text-center py-12 mb-12">
            <h1 class="text-6xl font-bold mb-4 gradient-text animate-float">Katalog Barang Galaksi</h1>
            <p class="text-xl text-gray-400">Kelola inventaris barang Anda di alam semesta digital</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-8 mb-12">
            <!-- Form Input Barang -->
            <div class="w-full lg:w-1/3 glass-panel p-8">
                <h2 class="text-3xl font-bold mb-8 gradient-text">Form Input Barang</h2>
                <form id="productForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-300">Nama Barang</label>
                        <input
                            type="text"
                            id="productName"
                            class="input-field w-full px-5 py-3"
                            placeholder="Masukkan nama barang"
                            required
                        />
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-300">Harga (Rp)</label>
                        <input
                            type="number"
                            id="productPrice"
                            class="input-field w-full px-5 py-3"
                            placeholder="0"
                            min="0"
                            step="1000"
                            required
                        />
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2 text-gray-300">Stok</label>
                        <input
                            type="number"
                            id="productStock"
                            class="input-field w-full px-5 py-3"
                            placeholder="0"
                            min="0"
                            required
                        />
                    </div>

                    <button
                        type="submit"
                        class="button-primary w-full py-4 text-lg"
                    >
                        Tambah Barang
                    </button>
                </form>
            </div>

            <!-- Tabel Katalog Barang -->
            <div class="w-full lg:w-2/3 glass-panel p-8">
                <h2 class="text-3xl font-bold mb-8 gradient-text">Katalog Barang</h2>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="table-header">
                                <th class="px-6 py-4 text-left">Nama Barang</th>
                                <th class="px-6 py-4 text-left">Harga (Rp)</th>
                                <th class="px-6 py-4 text-left">Stok</th>
                                <th class="px-6 py-4 text-left">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody">
                            <!-- Data barang akan ditampilkan di sini -->
                            <tr class="text-center py-4 text-gray-400">
                                <td colspan="4" class="py-12">Belum ada barang. Tambah barang pertama Anda!</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="emptyState" class="hidden text-center py-12">
                    <div class="w-24 h-24 mx-auto mb-4 bg-gray-800 rounded-full flex items-center justify-center">
                        <svg class="w-12 h-12 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 11H4"></path>
                        </svg>
                        <p class="text-gray-500">Belum ada barang di katalog</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
