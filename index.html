<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="prev" id="prev"></div>
      <div class="current" id="current">0</div>
    </div>

    <div class="buttons">
      <button class="btn clear" data-action="clear">AC</button>
      <button class="btn operator" data-action="percent">%</button>
      <button class="btn operator" data-operator="/">&divide;</button>
      <button class="btn operator" data-operator="*">&times;</button>

      <button class="btn" data-number="7">7</button>
      <button class="btn" data-number="8">8</button>
      <button class="btn" data-number="9">9</button>
      <button class="btn operator" data-operator="/">&divide;</button>

      <button class="btn" data-number="4">4</button>
      <button class="btn" data-number="5">5</button>
      <button class="btn" data-number="6">6</button>
      <button class="btn operator" data-operator="*">&times;</button>

      <button class="btn" data-number="1">1</button>
      <button class="btn" data-number="2">2</button>
      <button class="btn" data-number="3">3</button>
      <button class="btn operator" data-operator="-">&minus;</button>

      <button class="btn span-two" data-number="0">0</button>
      <button class="btn" data-number=".">.</button>
      <button class="btn operator" data-operator="+">+</button>
    </div>

    <div class="bottom">
      <button class="btn clear wide" data-action="clear">C</button>
      <button class="btn equals wide" data-action="equals">=</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
